name: Run Available Vacancy check

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: available-vacancy-check
  cancel-in-progress: false

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests telethon python-dotenv urllib3

      - name: Run parser
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
        run: |
          python Projects/bot_check_available_vacancy/bot_check_available_vacancy.py

      - name: Save updated channel state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git status

          git add channel_state.json

          if git diff --cached --quiet; then
            echo "channel_state.json не изменился, коммит не нужен"
          else
            git commit -m "Update channel state"
            git push
          fi